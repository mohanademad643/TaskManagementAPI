version: '3.9'

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanagement_db
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - taskmanagement_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db52908.public.databaseasp.net; Database=db52908; User Id=db52908; Password=mX!34-bFPa8? ; Encrypt=False; MultipleActiveResultSets=True;"
      JwtSettings__SecretKey: "MmLZO3Udv255sMLmIPBphtjyz4oVI86H0iYoyVgWGOsxKjhHWpU8tyyOywjxhr0x"
      JwtSettings__Issuer: "TaskManagementAPI"
      JwtSettings__Audience: "TaskManagementClient"
      JwtSettings__ExpiryMinutes: "1440"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - taskmanagement_network

volumes:
  sqlserver_data:

networks:
  taskmanagement_network:
    driver: bridge